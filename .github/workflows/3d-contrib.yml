name: 3D Contribution Graph
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: okramjimmy
      - run: |
          git config user.email "okramjimmy@gmail.com"
          git config user.name "okramjimmy"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update 3D contrib graph [skip ci]"
          git push
